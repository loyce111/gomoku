<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋 - 格子编号版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #2c2416;
    font-family: 'SimHei', '黑体', 'Microsoft YaHei', sans-serif;
    color: #e8d5b7;
    padding: 20px;
  }
  h1 { margin-bottom: 8px; font-size: 28px; letter-spacing: 4px; }
  .info { margin-bottom: 16px; font-size: 14px; color: #b8a58a; }
  .status {
    font-size: 20px;
    margin-bottom: 10px;
    padding: 6px 24px;
    background: #3d3222;
    border-radius: 20px;
    letter-spacing: 2px;
  }
  .board-wrap {
    position: relative;
    background: #d4a754;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  canvas { display: block; cursor: pointer; border-radius: 4px; }
  .btn-row { margin-top: 16px; display: flex; gap: 12px; }
  button {
    padding: 10px 28px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 2px;
    font-weight: bold;
    transition: all 0.2s;
  }
  .btn-restart { background: #8b7355; color: #fff; }
  .btn-restart:hover { background: #a0845c; }
  .btn-undo { background: #5a4a3a; color: #fff; }
  .btn-undo:hover { background: #6e5c4a; }
</style>
</head>
<body>

<h1>五 子 棋</h1>
<div class="info">每个交叉点标有编号 1 ~ 225（从左上到右下）</div>
<div class="status" id="status">● 黑方落子</div>

<div class="board-wrap">
  <canvas id="board" width="880" height="880"></canvas>
</div>

<div class="btn-row">
  <button class="btn-undo" onclick="undo()">⟲ 悔棋</button>
  <button class="btn-restart" onclick="restart()">↻ 重新开始</button>
</div>

<script>
const SIZE = 15;
const CELL = 58;
const MARGIN = 32;
const RADIUS = 22;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null));
let blackTurn = true;
let gameOver = false;
let history = [];

// 编号到行列的映射：编号1在左上角(H8天元位置=113)
// 左上(0,0) = 1号, 右下(14,14) = 225号
function cellToNum(row, col) {
  return row * SIZE + col + 1;
}

function numToCell(num) {
  return { row: Math.floor((num - 1) / SIZE), col: (num - 1) % SIZE };
}

function drawBoard() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 棋盘背景
  ctx.fillStyle = '#d4a754';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格线
  ctx.strokeStyle = '#3a2a0a';
  ctx.lineWidth = 1;
  for (let i = 0; i < SIZE; i++) {
    const pos = MARGIN + i * CELL;
    ctx.beginPath();
    ctx.moveTo(MARGIN, pos);
    ctx.lineTo(MARGIN + (SIZE - 1) * CELL, pos);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos, MARGIN);
    ctx.lineTo(pos, MARGIN + (SIZE - 1) * CELL);
    ctx.stroke();
  }

  // 星位
  const stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
  ctx.fillStyle = '#3a2a0a';
  for (const [r, c] of stars) {
    ctx.beginPath();
    ctx.arc(MARGIN + c * CELL, MARGIN + r * CELL, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // 每个交叉点的编号 - 白色圆角标签
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] !== null) continue;
      const num = cellToNum(r, c);
      if (num > SIZE * SIZE) continue;
      const x = MARGIN + c * CELL;
      const y = MARGIN + r * CELL;

      // 白色圆角矩形背景
      const w = num < 100 ? 28 : 34;
      const h = 20;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.roundRect(x - w/2, y - h/2, w, h, 5);
      ctx.fill();

      // 深色粗体数字
      ctx.fillStyle = '#111111';
      ctx.font = 'bold 14px "SimHei", "黑体", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(num, x, y);
    }
  }
  // 棋子
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === null) continue;
      const x = MARGIN + c * CELL;
      const y = MARGIN + r * CELL;

      // 阴影
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.arc(x + 1.5, y + 1.5, RADIUS, 0, Math.PI * 2);
      ctx.fill();

      // 棋子本体
      const grad = ctx.createRadialGradient(x - 5, y - 5, 2, x, y, RADIUS);
      if (grid[r][c] === 'black') {
        grad.addColorStop(0, '#555');
        grad.addColorStop(1, '#111');
      } else {
        grad.addColorStop(0, '#fff');
        grad.addColorStop(1, '#ccc');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
      ctx.fill();

      // 高光
      ctx.fillStyle = grid[r][c] === 'black'
        ? 'rgba(255,255,255,0.15)'
        : 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.arc(x - 4, y - 4, RADIUS * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // 最后落子标记
  if (history.length > 0) {
    const last = history[history.length - 1];
    const x = MARGIN + last.col * CELL;
    const y = MARGIN + last.row * CELL;
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x, y, RADIUS - 3, 0, Math.PI * 2);
    ctx.stroke();
  }
}

canvas.addEventListener('click', (e) => {
  if (gameOver) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const col = Math.round((mx - MARGIN) / CELL);
  const row = Math.round((my - MARGIN) / CELL);

  if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return;

  // 检查是否点在了交叉点附近
  const cx = MARGIN + col * CELL;
  const cy = MARGIN + row * CELL;
  const dist = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2);
  if (dist > RADIUS + 3) return;

  if (grid[row][col] !== null) return;

  const color = blackTurn ? 'black' : 'white';
  grid[row][col] = color;
  history.push({ row, col, color });

  if (checkWin(row, col, color)) {
    gameOver = true;
    statusEl.textContent = (color === 'black' ? '● 黑方' : '○ 白方') + ' 胜利！🎉';
    drawBoard();
    return;
  }

  if (history.length === SIZE * SIZE) {
    gameOver = true;
    statusEl.textContent = '平局！';
    drawBoard();
    return;
  }

  blackTurn = !blackTurn;
  statusEl.textContent = blackTurn ? '● 黑方落子' : '○ 白方落子';
  drawBoard();
});

function checkWin(row, col, color) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let i = 1; i < 5; i++) {
      const r = row + dr * i, c = col + dc * i;
      if (r >= 0 && r < SIZE && c >= 0 && c < SIZE && grid[r][c] === color) count++; else break;
    }
    for (let i = 1; i < 5; i++) {
      const r = row - dr * i, c = col - dc * i;
      if (r >= 0 && r < SIZE && c >= 0 && c < SIZE && grid[r][c] === color) count++; else break;
    }
    if (count >= 5) return true;
  }
  return false;
}

function undo() {
  if (gameOver) { gameOver = false; }
  if (history.length === 0) return;
  const last = history.pop();
  grid[last.row][last.col] = null;
  blackTurn = (last.color === 'black');
  statusEl.textContent = blackTurn ? '● 黑方落子' : '○ 白方落子';
  drawBoard();
}

function restart() {
  grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null));
  blackTurn = true;
  gameOver = false;
  history = [];
  statusEl.textContent = '● 黑方落子';
  drawBoard();
}

drawBoard();
</script>
</body>
</html>
